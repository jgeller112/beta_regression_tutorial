project:
  title: "A Beta Way"
  render:
    - /manuscript/ms.qmd

site-url: https://jgeller112.github.io/beta_regression_tutorial/

format:
  apaquarto-pdf:
    documentmode: doc
    include-in-header:
      - text: |
          \usepackage{fvextra}
          \DefineVerbatimEnvironment{Highlighting}{Verbatim}{breaklines,commandchars=\\\{\}}
          \renewcommand{\baselinestretch}{1.2}
          \setlength{\parskip}{0.5em}
          \usepackage{geometry}
          \geometry{margin=1in}
          \usepackage{setspace}
          \setstretch{1.2}
          \AtBeginEnvironment{verbatim}{\singlespacing}
  apaquarto-docx: default
  apaquarto-html:
    toc: true
    toc-depth: 2
    toc-title: Manuscript Outline
    toc-location: right
    echo: true
    code-tools: true
    code-fold: true
    code-summary: "Show R code"

    site-url: https://jgeller112.github.io/beta_regression_tutorial/
    comments:
      hypothesis: true
execute: 
  echo: true
  execute-dir: project

